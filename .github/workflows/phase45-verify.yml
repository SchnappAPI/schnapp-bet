# One-shot verification for Phase 4.5 (PR #11) — delete after the PR merges.
# Runs the pending Mac-side checks from MEMORY.md on mac-runner-1:
#   1. pitch_call_code frequencies (sanity-check WHIFF_CALL_CODES = S/W/M/Q
#      in web/app/api/mlb/research/leaders/route.ts)
#   2. the leaders route's rail queries against the live DB, one row each
name: Phase 4.5 Verify (one-shot)

on:
  workflow_dispatch:

env:
  SQL_TRUST_CERT: "yes"
  PYTHONPATH: /Users/schnapp/code/schnapp-bet

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: [self-hosted, mac-runner]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SQL_DATABASE: op://web-variables/Database/database
          SQL_PASSWORD: op://web-variables/Database/password
          SQL_SERVER: op://web-variables/Database/server
          SQL_USERNAME: op://web-variables/Database/username

      - name: Activate venv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Verify leaders queries + whiff call codes
        run: python .github/workflows/scripts/phase45_verify.py
