name: Weekly Calibration

# Weekly recalibration of the prop grading model. Runs Sunday 06:00 UTC
# (after Saturday games finish settling). Produces a snapshot in
# common.grade_calibration_history and replaces common.grade_calibration
# so the daily grading run picks up the fresh calibrator.
#
# Per ADR-20260425-3: this is the ONLY writer of common.grade_calibration
# going forward. Daily grading reads from it but does not refit.

on:
  schedule:
    # Sunday 06:00 UTC = Saturday late-night ET. Most NBA games finish
    # by then; outcome data is fully settled.
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      window_days:
        description: 'Rolling window for calibration (default 30)'
        required: false
        default: '30'
      sport:
        description: 'Sport key (default nba)'
        required: false
        default: 'nba'
      dry_run:
        description: 'Compute but do not write (true/false)'
        required: false
        default: 'false'

env:
  SQL_TRUST_CERT: "yes"
  PYTHONPATH: /Users/schnapp/code/schnapp-bet

# Prevent overlapping runs (e.g. a slow run vs the next cron tick, or a manual
# dispatch racing a scheduled one). New runs queue instead of cancelling.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  recalibrate:
    runs-on: [self-hosted, mac-runner]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4


      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SQL_DATABASE: op://web-variables/Database/database
          SQL_PASSWORD: op://web-variables/Database/password
          SQL_SERVER: op://web-variables/Database/server
          SQL_USERNAME: op://web-variables/Database/username
      - name: Activate virtualenv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Run weekly calibration
        env:
          WINDOW_DAYS: ${{ github.event.inputs.window_days || '30' }}
          SPORT:       ${{ github.event.inputs.sport       || 'nba' }}
          DRY_RUN:     ${{ github.event.inputs.dry_run     || 'false' }}
        run: |
          set -euo pipefail
          ARGS="--window-days $WINDOW_DAYS --sport $SPORT"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python grading/weekly_calibration.py $ARGS
