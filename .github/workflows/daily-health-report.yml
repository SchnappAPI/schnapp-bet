name: Daily Health Report

# Regenerates docs/HEALTH.md and commits it to main at 13:00 UTC daily
# (after odds-etl at 10:00, NBA grading at 11:00, MLB grading at 11:30).
# The commit uses [skip ci] to avoid triggering downstream workflows.

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      as_of:
        description: 'Override date label (YYYY-MM-DD); empty = current UTC time'
        required: false
        default: ''

env:
  SQL_TRUST_CERT: "yes"
  PYTHONPATH: /Users/schnapp/code/schnapp-bet

jobs:
  report:
    runs-on: [self-hosted, mac-runner]
    permissions:
      contents: write
      issues: read

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SQL_DATABASE: op://web-variables/Database/database
          SQL_PASSWORD: op://web-variables/Database/password
          SQL_SERVER: op://web-variables/Database/server
          SQL_USERNAME: op://web-variables/Database/username
      - name: Activate venv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Generate health report
        env:
          AS_OF: ${{ github.event.inputs.as_of }}
        run: |
          python -c "
          import os
          from shared.db import get_engine
          from shared.integrity import generate_health_report
          as_of = os.environ.get('AS_OF') or None
          report = generate_health_report(get_engine(), as_of=as_of)
          with open('docs/HEALTH.md', 'w') as f:
              f.write(report)
          print('Health report written to docs/HEALTH.md')
          "

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/HEALTH.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: regenerate HEALTH.md [skip ci]"
          git push
