name: NFL ETL

on:
  schedule:
    - cron: '0 9 * * 2'   # Tuesday 09:00 UTC, after MNF + nflverse update
  workflow_dispatch:
    inputs:
      season:
        description: 'NFL season year (e.g. 2025). Blank = current season.'
        required: false
        default: ''
        type: string

env:
  SQL_TRUST_CERT: "yes"
  PYTHONPATH: /Users/schnapp/code/schnapp-bet

# Prevent overlapping runs (e.g. a slow run vs the next cron tick, or a manual
# dispatch racing a scheduled one). New runs queue instead of cancelling.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  etl:
    runs-on: [self-hosted, mac-runner]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SQL_DATABASE: op://web-variables/Database/database
          SQL_PASSWORD: op://web-variables/Database/password
          SQL_SERVER: op://web-variables/Database/server
          SQL_USERNAME: op://web-variables/Database/username
      - name: Activate venv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Run NFL ETL
        run: |
          if [ -n "${{ github.event.inputs.season }}" ]; then
            python etl/nfl_etl.py --season ${{ github.event.inputs.season }}
          else
            python etl/nfl_etl.py
          fi

      - name: Record workflow run timestamp
        run: python -c "from shared.db import record_workflow_run; record_workflow_run('nfl-etl')"

      - name: Notify failure (deduped GitHub Issue)
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
