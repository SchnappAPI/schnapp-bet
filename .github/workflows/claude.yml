name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: op://web-variables/Claude Code/oauth_token
          GITHUB_PAT: op://web-variables/GitHub/pat_git_credentials
          MAC_MCP_AUTH_TOKEN: op://web-variables/MCP Tokens/schnapp_mac

      - name: Set up schnapp plugins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/SchnappAPI/schnapp-kit.git /tmp/schnapp-kit
          mkdir -p ~/.claude
          cat > ~/.claude/settings.json <<'SETTINGS'
          {
            "extraKnownMarketplaces": {
              "schnapp-kit": {"source": {"source": "directory", "path": "/tmp/schnapp-kit"}},
              "schnapp-overlays": {"source": {"source": "directory", "path": "/tmp/schnapp-kit/overlays"}},
              "ecc": {"source": {"source": "directory", "path": "/tmp/schnapp-kit/core"}},
              "mattpocock-skills": {"source": {"source": "directory", "path": "/tmp/schnapp-kit/vendored/mattpocock-skills"}}
            },
            "enabledPlugins": {
              "schnapp-kit@schnapp-kit": true,
              "schnapp-overlays@schnapp-overlays": true,
              "ecc@ecc": true,
              "mattpocock-skills@mattpocock-skills": true
            }
          }
          SETTINGS

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mcp_config: |
            {
              "mcpServers": {
                "mac-mcp": {
                  "type": "http",
                  "url": "https://mac-mcp.schnapp.bet/mcp",
                  "headers": {
                    "Authorization": "Bearer ${{ env.MAC_MCP_AUTH_TOKEN }}"
                  }
                }
              }
            }
        env:
          GITHUB_PAT: ${{ env.GITHUB_PAT }}
          MAC_MCP_AUTH_TOKEN: ${{ env.MAC_MCP_AUTH_TOKEN }}
