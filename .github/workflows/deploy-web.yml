name: deploy-web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"

jobs:
  deploy:
    runs-on: mac-runner
    timeout-minutes: 15

    steps:
      - name: Prepare staging directory
        run: |
          BASE=/Users/schnapp
          rm -rf "$BASE/web-next"
          git clone https://github.com/SchnappAPI/schnapp-bet.git "$BASE/web-next"

      - name: Install dependencies (staging)
        run: |
          cd /Users/schnapp/web-next/web
          npm ci --no-workspaces

      - name: Inject SW version
        run: |
          SW_VER=$(git -C /Users/schnapp/web-next rev-parse --short HEAD)
          sed -i '' "s/__SW_VERSION__/$SW_VER/" /Users/schnapp/web-next/web/public/sw.js
          echo "SW cache name: schnapp-shell-$SW_VER"

      - name: Build (staging)
        run: |
          cd /Users/schnapp/web-next/web
          npm run build --no-workspaces
        env:
          NODE_ENV: production

      # Build succeeded — swap directories and restart
      - name: Swap and restart
        run: |
          BASE=/Users/schnapp
          rm -rf "$BASE/web-prev"
          mv "$BASE/schnapp-bet" "$BASE/web-prev"
          mv "$BASE/web-next"        "$BASE/schnapp-bet"
          launchctl unload "$BASE/Library/LaunchAgents/bet.schnapp.web-prod.plist"
          launchctl load   "$BASE/Library/LaunchAgents/bet.schnapp.web-prod.plist"

      - name: Smoke test (rollback on failure)
        run: |
          BASE=/Users/schnapp
          sleep 5
          if curl -sf http://127.0.0.1:3001 > /dev/null; then
            echo "Smoke test passed"
            rm -rf "$BASE/web-prev"
          else
            echo "Smoke test failed — rolling back"
            launchctl unload "$BASE/Library/LaunchAgents/bet.schnapp.web-prod.plist"
            mv "$BASE/schnapp-bet" "$BASE/web-bad"
            mv "$BASE/web-prev"        "$BASE/schnapp-bet"
            launchctl load "$BASE/Library/LaunchAgents/bet.schnapp.web-prod.plist"
            echo "Rollback complete — previous version restored"
            exit 1
          fi
