name: deploy-web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"

jobs:
  deploy:
    runs-on: mac-runner
    timeout-minutes: 15

    steps:
      - name: Prepare staging directory
        run: |
          BASE=/Users/schnapp/code
          rm -rf "$BASE/web-next"
          git clone https://github.com/SchnappAPI/schnapp-bet.git "$BASE/web-next"

      - name: Install dependencies (staging)
        run: |
          cd /Users/schnapp/code/web-next/web
          npm ci --no-workspaces --include=dev
          # E2E browser. Installs to ~/Library/Caches/ms-playwright (shared,
          # persists across deploys), so it is reused after the dir swap.
          npx playwright install chromium

      - name: Inject SW version
        run: |
          SW_VER=$(git -C /Users/schnapp/code/web-next rev-parse --short HEAD)
          sed -i '' "s/__SW_VERSION__/$SW_VER/" /Users/schnapp/code/web-next/web/public/sw.js
          echo "SW cache name: schnapp-shell-$SW_VER"

      - name: Build (staging)
        run: |
          cd /Users/schnapp/code/web-next/web
          npm run build --no-workspaces
        env:
          NODE_ENV: production

      # Build succeeded — swap directories and restart
      - name: Swap and restart
        run: |
          BASE=/Users/schnapp/code
          rm -rf "$BASE/web-prev"
          mv "$BASE/schnapp-bet" "$BASE/web-prev"
          mv "$BASE/web-next"        "$BASE/schnapp-bet"
          launchctl unload "/Users/schnapp/Library/LaunchAgents/bet.schnapp.web-prod.plist"
          launchctl load   "/Users/schnapp/Library/LaunchAgents/bet.schnapp.web-prod.plist"

      # Route-level E2E gate. Replaces the single-curl homepage smoke test:
      # exercises /nba /mlb /nfl and the @tanstack grades grid against the
      # freshly-swapped :3001 process, asserting each route mounts its chrome
      # with zero console errors. A broken route fails here and triggers the
      # same rollback the curl used to, so it never finalizes the deploy.
      - name: E2E route tests (rollback on failure)
        run: |
          BASE=/Users/schnapp/code
          sleep 12
          cd "$BASE/schnapp-bet/web"
          if npm run test:e2e; then
            echo "E2E route tests passed"
            rm -rf "$BASE/web-prev"
          else
            echo "E2E route tests failed — rolling back"
            launchctl unload "/Users/schnapp/Library/LaunchAgents/bet.schnapp.web-prod.plist"
            rm -rf "$BASE/web-bad"
            mv "$BASE/schnapp-bet" "$BASE/web-bad"
            mv "$BASE/web-prev"    "$BASE/schnapp-bet"
            launchctl load "/Users/schnapp/Library/LaunchAgents/bet.schnapp.web-prod.plist"
            echo "Rollback complete — previous version restored"
            exit 1
          fi
