name: Refresh Lines

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'   # 12:00 PM ET — midday line check
    - cron: '0 20 * * *'   # 03:00 PM ET — afternoon line drop
    - cron: '0 23 * * *'   # 06:00 PM ET — final pre-game refresh

env:
  SQL_TRUST_CERT: "yes"
  PYTHONPATH: /Users/schnapp/code/schnapp-bet

# Prevent overlapping runs (e.g. a slow run vs the next cron tick, or a manual
# dispatch racing a scheduled one). New runs queue instead of cancelling.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: [self-hosted, mac-runner]
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4


      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ODDS_API_KEY: op://web-variables/ODDS_API_KEY/credential
          SQL_DATABASE: op://web-variables/Database/database
          SQL_PASSWORD: op://web-variables/Database/password
          SQL_SERVER: op://web-variables/Database/server
          SQL_USERNAME: op://web-variables/Database/username
      - name: Activate virtualenv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Fetch latest props
        run: python etl/odds_etl.py --mode upcoming --sport nba --days-ahead 1

      - name: Re-grade against latest lines
        run: python grading/grade_props.py --mode upcoming

      - name: Record workflow run timestamp
        run: python -c "from shared.db import record_workflow_run; record_workflow_run('refresh-lines')"

      - name: Notify failure (deduped GitHub Issue)
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
