name: MLB Play-by-Play ETL

# Nightly at 09:30 UTC, after mlb-etl (09:00) has upserted new Final games.
# Everything downstream depends on this: player_at_bats -> trend stats ->
# BvP -> grading matchups and the web VS/EV/Exit-Velo/Proj views. Leaving it
# manual-only froze the pitch-level tables at 2026-04-30 mid-season.
on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      batch:
        description: "Max games to process per run"
        required: false
        default: "50"
      seasons:
        description: "Space-separated season years (e.g. 2026 or 2024 2025 2026). Empty = current season."
        required: false
        default: ""
      rebuild_at_bats:
        description: "Skip PBP fetch; rebuild mlb.player_at_bats from existing PBP data"
        required: false
        default: "false"
        type: boolean
      rebuild_bvp:
        description: "Skip PBP fetch; rebuild mlb.career_batter_vs_pitcher from existing player_at_bats data"
        required: false
        default: "false"
        type: boolean
      rebuild_trend_stats:
        description: "Skip PBP fetch; rebuild mlb.player_trend_stats from existing player_at_bats data"
        required: false
        default: "false"
        type: boolean
      rebuild_game_statcast:
        description: "Skip PBP fetch; rebuild mlb.player_game_statcast from existing player_at_bats data"
        required: false
        default: "false"
        type: boolean

env:
  SQL_TRUST_CERT: "yes"
  PYTHONPATH: /Users/schnapp/code/schnapp-bet

# Prevent overlapping runs (e.g. a slow run vs the next cron tick, or a manual
# dispatch racing a scheduled one). New runs queue instead of cancelling.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  pbp:
    runs-on: [self-hosted, mac-runner]
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SQL_DATABASE: op://web-variables/Database/database
          SQL_PASSWORD: op://web-variables/Database/password
          SQL_SERVER: op://web-variables/Database/server
          SQL_USERNAME: op://web-variables/Database/username
      - name: Activate venv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Run MLB Play-by-Play ETL
        run: |
          REBUILD_AB="${{ github.event.inputs.rebuild_at_bats }}"
          REBUILD_BVP="${{ github.event.inputs.rebuild_bvp }}"
          REBUILD_TREND="${{ github.event.inputs.rebuild_trend_stats }}"
          REBUILD_GSC="${{ github.event.inputs.rebuild_game_statcast }}"

          if [ "$REBUILD_AB" = "true" ] || [ "$REBUILD_BVP" = "true" ] || [ "$REBUILD_TREND" = "true" ] || [ "$REBUILD_GSC" = "true" ]; then
            FLAGS=""
            if [ "$REBUILD_AB" = "true" ]; then
              FLAGS="$FLAGS --rebuild-at-bats"
            fi
            if [ "$REBUILD_GSC" = "true" ]; then
              FLAGS="$FLAGS --rebuild-game-statcast"
            fi
            if [ "$REBUILD_BVP" = "true" ]; then
              FLAGS="$FLAGS --rebuild-bvp"
            fi
            if [ "$REBUILD_TREND" = "true" ]; then
              FLAGS="$FLAGS --rebuild-trend-stats"
            fi
            echo "Running rebuild mode with flags:$FLAGS"
            python etl/mlb_play_by_play.py $FLAGS
          else
            # Scheduled runs have no inputs: default the batch, derive the
            # season inside the script (omit --seasons entirely).
            BATCH="${{ github.event.inputs.batch || '50' }}"
            SEASONS="${{ github.event.inputs.seasons }}"
            ARGS="--batch $BATCH"
            [ -n "$SEASONS" ] && ARGS="$ARGS --seasons $SEASONS"
            python etl/mlb_play_by_play.py $ARGS
          fi

      - name: Record workflow run timestamp
        run: python -c "from shared.db import record_workflow_run; record_workflow_run('mlb-pbp-etl')"

      - name: Notify failure (deduped GitHub Issue)
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
