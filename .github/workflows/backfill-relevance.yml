name: Backfill Relevance Columns (One-Shot)

# Surgical UPDATE-only run that fills the four grading-v2 Phase-2 columns
# (relevance_hit_rate, effective_n, role_minutes_current, role_volatility)
# on existing common.daily_grades rows for the lookback window. Does NOT
# touch composite_grade / momentum_grade / hit_rate_60 etc. — preserves
# historical predictions while bootstrapping the calibration corpus.
#
# Manual dispatch only. After it runs once, weekly_calibration can fit
# logistic models, and grade_props.py upcoming runs start emitting
# model_prob / ev_pct from that point forward.

on:
  workflow_dispatch:
    inputs:
      lookback:
        description: 'Days back from today to backfill (default 50; calibration uses 37)'
        required: false
        default: '50'
      dry_run:
        description: 'Print target dates only, no writes (true/false)'
        required: false
        default: 'false'

env:
  SQL_TRUST_CERT: "yes"
  PYTHONPATH: /Users/schnapp/code/schnapp-bet

jobs:
  backfill:
    runs-on: [self-hosted, mac-runner]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4


      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SQL_DATABASE: op://web-variables/Database/database
          SQL_PASSWORD: op://web-variables/Database/password
          SQL_SERVER: op://web-variables/Database/server
          SQL_USERNAME: op://web-variables/Database/username
      - name: Activate virtualenv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Run surgical backfill
        env:
          LOOKBACK: ${{ github.event.inputs.lookback || '50' }}
          DRY_RUN:  ${{ github.event.inputs.dry_run  || 'false' }}
        run: |
          set -euo pipefail
          ARGS="--lookback $LOOKBACK"
          [ "$DRY_RUN" = "true" ] && ARGS="$ARGS --dry-run"
          python grading/backfill_relevance_only.py $ARGS
